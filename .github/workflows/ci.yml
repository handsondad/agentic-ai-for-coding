name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装检查工具
        run: |
          pip install ruff mypy

      - name: Ruff 格式和 Lint 检查
        run: ruff check . && ruff format --check .

      - name: Mypy 类型检查
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true  # 初期允许类型检查失败，逐步收紧

  test:
    name: 测试
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装依赖
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -r requirements-dev.txt 2>/dev/null || pip install pytest pytest-asyncio pytest-cov

      - name: 运行单元测试
        run: |
          pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: 运行集成测试
        run: |
          pytest tests/integration/ -v --timeout=60
        env:
          PYTHONPATH: ${{ github.workspace }}
        continue-on-error: false

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装 Bandit
        run: pip install bandit[toml]

      - name: 运行安全扫描
        run: bandit -r src/ -ll -x tests/

  pr-description:
    name: PR 描述检查
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: 检查 PR 描述是否完整
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const requiredSections = ['背景', '变更摘要', '测试计划'];
            const missingSections = requiredSections.filter(s => !body.includes(s));
            if (missingSections.length > 0) {
              core.setFailed(`PR 描述缺少以下必填部分：${missingSections.join(', ')}`);
            }
