enabled: true
skills:
  run_agent:
    # 团队统一执行入口：从环境变量读取 AUTOMATION_AGENT_COMMAND。
    command: "python .github/automation/skills/skill_runner.py run-agent"

  quality_gate:
    # 统一执行质量门禁，按 AUTOMATION_QUALITY_COMMANDS 逐条执行。
    command: "python .github/automation/skills/skill_runner.py quality-gate"

  commit_and_push:
    # 统一提交与推送策略。
    command: "python .github/automation/skills/skill_runner.py commit-and-push --issue-number {issue_number} --branch-name {branch_name}"
